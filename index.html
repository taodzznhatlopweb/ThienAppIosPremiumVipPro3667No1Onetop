<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>ThienPremiumIos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="backgroundGlow"></div>

<!-- =========================
        LOGIN PAGE
========================= -->

<div id="loginPage" class="page">

    <div class="loginBox">

        <div class="logoCircle">
            TP
        </div>

        <h1 class="title">
            ThienPremiumIos
        </h1>

        <p class="subtitle">
            Đăng nhập bằng key
        </p>

        <input
            id="keyInput"
            type="text"
            placeholder="Nhập Key">

        <button id="loginBtn">
            Đăng Nhập
        </button>

        <div id="loginStatus"></div>

    </div>

</div>

<!-- =========================
        MAIN PAGE
========================= -->

<div id="mainPage" class="page hidden">

    <div class="mainCard">

        <h1 class="mainTitle">ThienPremiumIos</h1>

        <p class="mainSub">
            Premium iOS Interface
        </p>

        <div class="switchContainer">

            <div class="switchItem">
                <span>Sensivity Boost</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Aimlock Head</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Aim Hold</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Stability Assist</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>AimDrag</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Screen Boost</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>DragLock</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Shake Fix</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switchItem">
                <span>Optimize</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

        <div class="fpsBox">

            <div class="fpsText">
                <span>FPS</span>
                <span id="fpsValue">60</span>
            </div>

            <input
                id="fpsSlider"
                type="range"
                min="60"
                max="120"
                value="60">

        </div>

        <button id="startButton">
            ẤN VÀO ĐÂY ĐỂ BẮT ĐẦU
        </button>

    </div>

</div>
<!-- =========================
        LOADING PAGE
========================= -->

<div id="loadingPage" class="page hidden">

<div class="terminal">

<div class="terminalTitle">

Running...

</div>

<pre id="terminalOutput"></pre>

<button
id="finishButton"
class="hidden">

Xong

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
